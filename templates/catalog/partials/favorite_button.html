{% comment %}Partial renderizado via HTMX no toggle de favorito{% endcomment %}
<button
  hx-post="{% url 'catalog:toggle_favorite' rubric.id %}"
  hx-swap="outerHTML"
  hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
  class="shrink-0 flex items-center gap-1.5 text-sm px-3 py-1.5 rounded-lg border
         {% if is_favorite %}border-brand-200 bg-brand-50 text-brand-700
         {% else %}border-slate-200 text-slate-500 hover:border-brand-200 hover:text-brand-600{% endif %}
         transition-colors">
  <svg class="w-4 h-4" fill="{% if is_favorite %}currentColor{% else %}none{% endif %}"
       stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/>
  </svg>
  {% if is_favorite %}Salvo{% else %}Salvar{% endif %}
</button>
