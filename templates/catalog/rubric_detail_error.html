{% extends "base.html" %}
{% block title %}Erro{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 py-20 text-center">
  <div class="text-4xl mb-4">⚠️</div>
  <h1 class="text-xl font-bold text-slate-700 mb-2">Incidência não cadastrada</h1>
  <p class="text-slate-500 text-sm mb-6">
    A rubrica <strong>{{ rubric.name }}</strong> ainda não possui incidências cadastradas.
    Ela pode estar em processo de revisão.
  </p>
  <a href="{% url 'catalog:home' %}" class="text-brand-600 font-medium hover:underline text-sm">
    Voltar para a busca
  </a>
</div>
{% endblock %}
