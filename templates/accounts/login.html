{% extends "base.html" %}
{% block title %}Entrar{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4">
  <div class="w-full max-w-md">

    <div class="text-center mb-8">
      <div class="text-3xl font-bold text-slate-900 mb-1">Bem-vindo de volta</div>
      <p class="text-slate-500 text-sm">Entre para acessar suas consultas e favoritos.</p>
    </div>

    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-8">
      <form method="post" class="space-y-4">
        {% csrf_token %}

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Usuário</label>
          <input type="text" name="username" required autofocus
                 class="w-full px-3 py-2.5 rounded-lg border border-slate-200 text-sm
                        focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition">
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Senha</label>
          <input type="password" name="password" required
                 class="w-full px-3 py-2.5 rounded-lg border border-slate-200 text-sm
                        focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition">
        </div>

        <button type="submit"
                class="w-full bg-brand-600 text-white py-2.5 rounded-lg text-sm font-semibold
                       hover:bg-brand-700 transition-colors mt-2">
          Entrar
        </button>
      </form>
    </div>

    <p class="text-center text-sm text-slate-500 mt-5">
      Ainda não tem conta?
      <a href="{% url 'accounts:register' %}" class="text-brand-600 font-medium hover:underline">
        Criar conta grátis
      </a>
    </p>

  </div>
</div>
{% endblock %}
