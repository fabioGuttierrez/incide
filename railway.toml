[build]
builder = "nixpacks"
buildCommand = "pip install -r requirements/production.txt && DJANGO_SETTINGS_MODULE=config.settings.production python manage.py collectstatic --noinput && DJANGO_SETTINGS_MODULE=config.settings.production python manage.py migrate"

[deploy]
startCommand = "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 60"
healthcheckPath = "/"
restartPolicyType = "on_failure"
